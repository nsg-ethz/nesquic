[package]
name = "neqo-iut"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.102"
socket2 = "0.6"
tracing = "0.1"
tokio = { version = "1.51.1", features = ["macros", "full"] }
utils = { path = "../../utils" }

neqo-transport = { git = "https://github.com/mozilla/neqo.git", package = "neqo-transport", tag = "v0.26.0" }
neqo-crypto    = { git = "https://github.com/mozilla/neqo.git", package = "neqo-crypto",    tag = "v0.23.1" }
neqo-common    = { git = "https://github.com/mozilla/neqo.git", package = "neqo-common",    tag = "v0.23.1" }
neqo-udp       = { git = "https://github.com/mozilla/neqo.git", package = "neqo-udp",       tag = "v0.23.1" }
quinn-udp      = { version = "0.6", default-features = false }
