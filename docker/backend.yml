name: nesquic

networks:
    nesquic:
        driver: bridge
        driver_opts:
            com.docker.network.bridge.name: nesquic

volumes:
    grafana_data:
    prometheus_data:

services:
    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        networks:
            - nesquic
        restart: unless-stopped
        ports:
            - "9092:9090"
        volumes:
            - prometheus_data:/etc/prometheus
            - ./prometheus/config.yml:/etc/prometheus/prometheus.yml:ro
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--query.lookback-delta=1y"
            - "--storage.tsdb.retention.time=1y"
            - "--web.console.libraries=/etc/prometheus/console_libraries"
            - "--web.console.templates=/etc/prometheus/consoles"
            - "--web.enable-lifecycle"

    pushgateway:
        image: prom/pushgateway:latest
        container_name: pushgateway
        networks:
            - nesquic
        restart: unless-stopped
        ports:
            - "9091:9091"

    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        networks:
            - nesquic
        restart: unless-stopped
        ports:
            - "3000:3000"
        depends_on:
            - prometheus
        user: root
        volumes:
            - grafana_data:/var/lib/grafana
            - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/nesquic.yml:ro
            - ./grafana/dashboard.yml:/etc/grafana/provisioning/dashboards/nesquic.yml:ro
            - ./grafana/dashboard:/var/lib/grafana/dashboards:ro
        environment:
            - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
            - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
            - GF_AUTH_DISABLE_LOGIN_FORM=true
            - GF_USERS_ALLOW_SIGN_UP=false
