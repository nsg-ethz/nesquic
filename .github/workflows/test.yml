name: Test

on:
    push:
        branches:
            - "**"
            - "!dependabot/**"
    pull_request:
        branches: [main]
    workflow_call:

jobs:
    test:
        name: Test [${{ matrix.rust }}, ${{ matrix.profile }} - ${{ matrix.library }}]
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: false
            matrix:
                rust: [stable, nightly]
                profile: [dev, release]
                library: [quinn, quiche, neqo]
                exclude:
                    - rust: nightly
                      profile: release
        # Anything nightly is treated as informational-only.
        continue-on-error: ${{ matrix.rust == 'nightly' || matrix.library == 'neqo' }}
        steps:
            - name: "Set environmental variables"
              shell: bash
              run: |
                  #RUST_BACKTRACE_nightly='1'
                  #CFLAGS_nightly='-fsanitize=leak'
                  #CXXFLAGS_nightly='-fsanitize=leak'
                  #RUSTFLAGS_nightly='-Zsanitizer=leak'

                  # A function for defining a variable conditional on the toolchain in
                  # use.
                  tc_var() {
                    # Replace any dots in the toolchain name with underscores. Necessary
                    # due to shell imposed variable naming restrictions.
                    var="${1}_$(echo ${{ matrix.rust }} | tr . _)"
                    echo "${1}=${!var}" >> ${GITHUB_ENV}
                  }
                  # if we are trying to build neqo, we need to set some env vars
                  if [[ "${{ matrix.library }}" == "neqo" ]]; then
                    echo "LD_LIBRARY_PATH=${{ github.workspace }}/static_dependencies/neqo_dependencies/dist/Release/lib" >> ${GITHUB_ENV}
                    echo "NSS_DIR=${{ github.workspace }}/static_dependencies/neqo_dependencies/nss" >> ${GITHUB_ENV}
                    echo "NSS_PREBUILT=1" >> ${GITHUB_ENV}
                  fi

                  tc_var RUST_BACKTRACE
                  tc_var RUSTFLAGS
                  tc_var CFLAGS
                  tc_var CXXFLAGS
            - uses: actions/checkout@v6
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ matrix.rust }}
                  components: rustfmt
            - name: Install deps
              run: |
                  sudo apt-get update
                  sudo apt-get install --yes --no-install-recommends clang-18 libelf-dev zlib1g-dev linux-headers-$(uname -r) libnuma-dev
                  sudo ln -s /usr/include/asm-generic /usr/include/asm
                  sudo rm -f /bin/clang && sudo ln -s /usr/bin/clang-18 /bin/clang && sudo ln -s /usr/bin/llvm-strip-18 /bin/llvm-strip
                  git clone --recurse-submodules https://github.com/libbpf/bpftool.git
                  cd bpftool/src && make && sudo make install
            - name: Dump BTF
              run: |
                  mkdir -p include
                  bpftool btf dump file /sys/kernel/btf/vmlinux format c > include/vmlinux.h
            - uses: Swatinem/rust-cache@v2
            - name: Build rcgen
              run: cargo build --profile=${{ matrix.profile }} --locked --verbose --bin rcgen
            - name: Generate certificate
              run: cargo rcgen
            - name: Build nesquic for library ${{ matrix.library }}
              run: cargo build --profile=${{ matrix.profile }} --locked --verbose --features=${{ matrix.library }} -p nesquic
            - name: Run tests
              run: cargo test --profile=${{ matrix.profile }} --locked --verbose --features=${{ matrix.library }} -p nesquic
