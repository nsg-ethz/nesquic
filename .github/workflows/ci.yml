name: CI

on:
    push:
        branches:
            - "**"
            - "!dependabot/**"
    pull_request:
        branches: [main]
    workflow_call:

jobs:
    nesquic:
        name: Test Nesquic [${{ matrix.rust }}, ${{ matrix.profile }}}]
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: false
            matrix:
                rust: [stable, nightly]
                profile: [dev, release]
                exclude:
                    - rust: nightly
                      profile: release
        # Anything nightly is treated as informational-only.
        continue-on-error: ${{ matrix.rust == 'nightly' }}
        steps:
            - name: "Set environmental variables"
              shell: bash
              run: |
                  #RUST_BACKTRACE_nightly='1'
                  #CFLAGS_nightly='-fsanitize=leak'
                  #CXXFLAGS_nightly='-fsanitize=leak'
                  #RUSTFLAGS_nightly='-Zsanitizer=leak'

                  # A function for defining a variable conditional on the toolchain in
                  # use.
                  tc_var() {
                    # Replace any dots in the toolchain name with underscores. Necessary
                    # due to shell imposed variable naming restrictions.
                    var="${1}_$(echo ${{ matrix.rust }} | tr . _)"
                    echo "${1}=${!var}" >> ${GITHUB_ENV}
                  }

                  tc_var RUST_BACKTRACE
                  tc_var RUSTFLAGS
                  tc_var CFLAGS
                  tc_var CXXFLAGS
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ matrix.rust }}
                  components: rustfmt
            - uses: awalsh128/cache-apt-pkgs-action@latest
              with:
                  packages: clang-18 libelf-dev zlib1g-dev libnuma-dev
                  version: latest
            - name: Configure LLVM
              run: |
                  sudo apt-get update
                  sudo apt-get install --yes --no-install-recommends linux-headers-$(uname -r)
                  sudo ln -s /usr/include/asm-generic /usr/include/asm
                  sudo rm -f /bin/clang && sudo ln -s /usr/bin/clang-18 /bin/clang && sudo ln -s /usr/bin/llvm-strip-18 /bin/llvm-strip
                  git clone --recurse-submodules https://github.com/libbpf/bpftool.git
                  cd bpftool/src && make && sudo make install
            - name: Dump BTF
              run: |
                  mkdir -p include
                  bpftool btf dump file /sys/kernel/btf/vmlinux format c > include/vmlinux.h
            - name: Run tests
              run: cargo test -p nesquic --locked --verbose
            - uses: Swatinem/rust-cache@v2
    libraries:
        name: Test ${{ matrix.library }}
        runs-on: ubuntu-24.04
        strategy:
            fail-fast: false
            matrix:
                library: [quinn, quiche, neqo, noq]
        steps:
            - uses: actions/checkout@v4
            - name: Test
              run: |
                  docker build -f docker/Dockerfile.${{ matrix.library }} --target builder -t ${{ matrix.library }}-builder .
                  docker run ${{ matrix.library }}-builder cargo test --release -p ${{ matrix.library }}-iut
            - name: Build container
              run: docker build -f docker/Dockerfile.${{ matrix.library }} -t nesquic/${{ matrix.library }}:latest .
